<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin Dashboard — NEXMART" />
  <!-- Prevent indexing of admin page -->
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Dashboard — NEXMART</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/pages/pages.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>" />
</head>
<body>

  <header id="main-header" role="banner"></header>

  <div class="page-wrapper">
    <div class="admin-layout">

      <!-- ── Sidebar ──────────────────────────────────────── -->
      <aside class="admin-sidebar" role="navigation" aria-label="Admin navigation">

        <div style="padding: 0 var(--space-6) var(--space-6); border-bottom: 1px solid var(--clr-border); margin-bottom: var(--space-4)">
          <div style="font-family: var(--font-display); font-size: var(--text-sm); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--clr-accent)">
            Admin Panel
          </div>
        </div>

        <nav>
          <button
            class="admin-nav-item admin-nav-item--active"
            data-view="overview"
            aria-label="Overview dashboard"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
            Overview
          </button>
          <button
            class="admin-nav-item"
            data-view="products"
            aria-label="Manage products"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
            Products
          </button>
          <button
            class="admin-nav-item"
            data-view="orders"
            aria-label="Manage orders"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
            Orders
          </button>
        </nav>

        <!-- Sidebar bottom links -->
        <div style="margin-top: auto; padding: var(--space-6) 0 0; border-top: 1px solid var(--clr-border)">
          <a href="/index.html" class="admin-nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Back to Storefront
          </a>
        </div>
      </aside>

      <!-- ── Main Content Area ───────────────────────────── -->
      <main class="admin-content" id="admin-content" role="main" aria-live="polite">
        <!-- Populated dynamically by admin.js -->
        <div style="display:flex; align-items:center; justify-content:center; height:200px">
          <div class="loader-spinner"></div>
        </div>
      </main>

    </div>
  </div>

  <script src="js/components/toast.js"></script>
  <script src="js/components/loader.js"></script>
  <script src="js/core/store.js"></script>
  <script src="js/core/api.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/components/navbar.js"></script>
  <script src="js/pages/admin.js"></script>
</body>
</html>
